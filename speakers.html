<!DOCTYPE html>
<html>
<head>
    <title>DevConf 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="speakers-section">
        <h2>Meet the Speakers</h2>
        <div class="speakers-container">
            <!-- Speaker 1 -->
            <div class="speaker-box">
                <img src="./assets/andrej.png" alt="Andrej">
                <div class="speaker-details">
                    <p class="track">AI / ML</p>
                    <h3>Andrej Karpathy</h3>
                    <p class="job-title">Pretraining team, Anthropic</p>
                </div>
            </div>
            <!-- Speaker 2 -->
            <div class="speaker-box">
                <img src="./assets/demis.png" alt="Demis">
                <div class="speaker-details">
                    <p class="track">CLOUD & DEVOPS</p>
                    <h3>Demis Hassabis</h3>
                    <p class="job-title">Co-Founder and CEO, Google DeepMind</p>
                </div>
            </div>
            <!-- Speaker 3 -->
            <div class="speaker-box">
                <img src="./assets/gary.png" alt="Gary">
                <div class="speaker-details">
                    <p class="track">FRONTEND</p>
                    <h3>Gary Marcus</h3>
                    <p class="job-title">Staff Engineer, Vercel</p>
                </div>
            </div>
            <!-- Speaker 4 -->
            <div class="speaker-box">
                <img src="./assets/mustafa.png" alt="Mustafa">
                <div class="speaker-details">
                    <p class="track">SECURITY</p>
                    <h3>Mustafa Suleyman</h3>
                    <p class="job-title">CEO of Microsoft AI</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
